<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snake — Single File</title>
    <style>
      :root {
        --bg: #0e0f12;
        --grid: #1a1d23;
        --snake: #54d69a;
        --snake-head: #79f0b6;
        --food: #ff5d6c;
        --text: #e6edf3;
        --muted: #8b949e;
        --accent: #4493f8;
      }

      html, body {
        height: 100%;
        margin: 0;
        background: radial-gradient(100vmax 100vmax at 10% 10%, #0c0d11, var(--bg));
        color: var(--text);
        font: 16px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      }

      .wrap {
        min-height: 100%;
        display: grid;
        grid-template-rows: auto 1fr auto;
        align-items: center;
        justify-items: center;
        gap: 16px;
        padding: 16px;
      }

      header {
        display: flex;
        gap: 16px;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        user-select: none;
      }

      header .pill {
        border: 1px solid #2b2f36;
        padding: 6px 10px;
        border-radius: 999px;
        display: flex;
        gap: 10px;
        align-items: center;
        background: #0f1116;
      }

      #stage {
        position: relative;
        width: min(92vmin, 640px);
        aspect-ratio: 1 / 1;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
        border-radius: 12px;
        background: var(--bg);
        box-shadow: 0 10px 40px rgba(0,0,0,0.35), inset 0 0 0 1px #1a1d23;
      }

      /* Header stats (moved out of stage so board stays clear) */
      .stats {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .badge {
        backdrop-filter: blur(3px);
        background: rgba(15,17,22,0.6);
        border: 1px solid rgba(68, 147, 248, 0.25);
        color: var(--text);
        padding: 6px 10px;
        border-radius: 8px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        pointer-events: none;
      }

      .overlay .panel {
        text-align: center;
        background: rgba(15,17,22,0.65);
        border: 1px solid #2b2f36;
        padding: 18px 20px;
        border-radius: 12px;
        pointer-events: auto;
      }

      .panel h1 {
        margin: 0 0 6px 0;
        font-size: 24px;
      }
      .panel p {
        margin: 6px 0;
        color: var(--muted);
      }

      .keys {
        display: inline-grid;
        grid-template-columns: repeat(3, auto);
        gap: 4px 8px;
        align-items: center;
        justify-items: center;
        color: var(--muted);
        margin-top: 6px;
      }
      .key {
        border: 1px solid #2b2f36;
        background: #0f1116;
        border-radius: 6px;
        padding: 2px 6px;
        min-width: 22px;
        text-align: center;
        font-size: 12px;
      }

      /* Touch controls */
      .dpad {
        position: absolute;
        right: 10px;
        bottom: 10px;
        display: grid;
        grid-template-areas:
          ". up ."
          "left . right"
          ". down .";
        gap: 6px;
        pointer-events: none;
        opacity: 0.6;
      }
      .btn {
        pointer-events: auto;
        width: 48px;
        height: 48px;
        border-radius: 10px;
        border: 1px solid #2b2f36;
        background: #0f1116;
        color: var(--text);
        display: grid;
        place-items: center;
        user-select: none;
      }
      .btn.up { grid-area: up; }
      .btn.down { grid-area: down; }
      .btn.left { grid-area: left; }
      .btn.right { grid-area: right; }
      .btn:active { filter: brightness(1.2); }

      /* Header help button */
      .help-btn { cursor: pointer; }

      body.playing header,
      body.playing footer {
        display: none;
      }

      footer {
        color: var(--muted);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="pill">Snake — single HTML file</div>
        <div class="pill">Arrow keys / WASD · Space: Pause · R: Restart</div>
        <div class="stats">
          <div class="badge" id="score">Score: 0</div>
          <div class="badge" id="best">Best: 0</div>
          <div class="badge" id="speed">Speed: 1.0x</div>
          <button class="pill help-btn" id="helpBtn" aria-label="Show help">Help</button>
        </div>
      </header>

      <div id="stage">
        <canvas id="game" aria-label="Snake game" role="img"></canvas>

        <div class="overlay" id="overlay" hidden>
          <div class="panel">
            <h1 id="stateTitle">Paused</h1>
            <p id="stateInfo">Press Space to resume</p>
            <div class="keys">
              <span class="key">↑</span>
              <span class="key">W</span>
              <span></span>
              <span class="key">←</span>
              <span class="key">A</span>
              <span class="key">→</span>
              <span class="key">S</span>
              <span></span>
              <span class="key">↓</span>
            </div>
          </div>
        </div>

        <div class="dpad" id="dpad">
          <div class="btn up" data-dir="0,-1">▲</div>
          <div class="btn left" data-dir="-1,0">◀</div>
          <div class="btn right" data-dir="1,0">▶</div>
          <div class="btn down" data-dir="0,1">▼</div>
        </div>
      </div>

      <footer>
        Built with canvas. No libraries. Have fun!
      </footer>
    </div>

    <script>
      (function () {
        const GRID = 24; // cells per row/column
        const BASE_INTERVAL = 125; // ms per step at 1.0x
        const SPEEDUP_EVERY = 5; // apples per speedup
        const SPEEDUP_FACTOR = 0.92; // interval multiplier each step
        const STORAGE_KEY = 'snake_high_score_v1';

        const stage = document.getElementById('stage');
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const $score = document.getElementById('score');
        const $best = document.getElementById('best');
        const $speed = document.getElementById('speed');
        const overlay = document.getElementById('overlay');
        const stateTitle = document.getElementById('stateTitle');
        const stateInfo = document.getElementById('stateInfo');
        const dpad = document.getElementById('dpad');
        const helpBtn = document.getElementById('helpBtn');

        let dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
        let cell = 0; // pixel size per grid cell (CSS pixels)
        let size = 0; // canvas CSS pixels

        let best = Number.parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10) || 0;
        $best.textContent = 'Best: ' + best;

        const initialSnake = () => {
          const start = { x: Math.floor(GRID / 2), y: Math.floor(GRID / 2) };
          return [
            { x: start.x, y: start.y },
            { x: start.x - 1, y: start.y },
            { x: start.x - 2, y: start.y },
          ];
        };

        let snake = initialSnake();
        let dir = { x: 1, y: 0 };
        let nextDir = { x: 1, y: 0 };
        let food = spawnFood();
        let score = 0;
        let interval = BASE_INTERVAL;
        let paused = true;
        let gameOver = false;
        let acc = 0; // accumulated time
        let last = 0;

        // Resize handling: maintain square canvas matching stage size
        function resize() {
          const rect = stage.getBoundingClientRect();
          size = Math.floor(rect.width);
          canvas.width = Math.floor(size * dpr);
          canvas.height = Math.floor(size * dpr);
          canvas.style.width = size + 'px';
          canvas.style.height = size + 'px';
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          cell = size / GRID;
          draw();
          positionDpad();
        }
        window.addEventListener('resize', () => {
          dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
          resize();
        });

        function positionDpad() {
          if (dpad.hidden) return;
          const rect = stage.getBoundingClientRect();
          const dRect = dpad.getBoundingClientRect();
          const spaceRight = window.innerWidth - rect.right;
          const spaceBottom = window.innerHeight - rect.bottom;

          dpad.style.left = '';
          dpad.style.transform = '';

          if (spaceRight > dRect.width + 20) {
            dpad.style.right = -(dRect.width + 10) + 'px';
            dpad.style.bottom = '0';
          } else if (spaceBottom > dRect.height + 20) {
            dpad.style.right = 'auto';
            dpad.style.bottom = -(dRect.height + 10) + 'px';
            dpad.style.left = (rect.width - dRect.width) / 2 + 'px';
          } else {
            dpad.style.right = '10px';
            dpad.style.bottom = '10px';
          }
        }

        // Helpers
        function randInt(n) { return Math.floor(Math.random() * n); }
        function eq(a, b) { return a.x === b.x && a.y === b.y; }
        function inSnake(pos) { return snake.some(s => eq(s, pos)); }
        function spawnFood() {
          let p;
          do { p = { x: randInt(GRID), y: randInt(GRID) }; } while (snake && inSnake(p));
          return p;
        }
        function setOverlay(show, title = '', info = '') {
          overlay.hidden = !show;
          stateTitle.textContent = title;
          stateInfo.textContent = info;
        }

        // Game control
        function reset() {
          snake = initialSnake();
          dir = { x: 1, y: 0 };
          nextDir = { x: 1, y: 0 };
          food = spawnFood();
          score = 0;
          interval = BASE_INTERVAL;
          paused = false;
          gameOver = false;
          acc = 0;
          last = 0;
          $score.textContent = 'Score: ' + score;
          $speed.textContent = 'Speed: ' + (BASE_INTERVAL / interval).toFixed(1) + 'x';
          setOverlay(false);
          document.body.classList.add('playing');
          positionDpad();
          draw();
        }

        function togglePause() {
          if (gameOver) return;
          paused = !paused;
          setOverlay(paused, paused ? 'Paused' : '', paused ? 'Press Space to resume' : '');
          if (paused) document.body.classList.remove('playing');
          else document.body.classList.add('playing');
          positionDpad();
        }

        // Input
        const OPP = (a, b) => a.x + b.x === 0 && a.y + b.y === 0;
        window.addEventListener('keydown', (e) => {
          const k = e.key.toLowerCase();
          let d = null;
          if (k === 'arrowup' || k === 'w') d = { x: 0, y: -1 };
          else if (k === 'arrowdown' || k === 's') d = { x: 0, y: 1 };
          else if (k === 'arrowleft' || k === 'a') d = { x: -1, y: 0 };
          else if (k === 'arrowright' || k === 'd') d = { x: 1, y: 0 };
          else if (k === ' ') { togglePause(); return; }
          else if (k === 'r') { reset(); return; }
          if (d) {
            e.preventDefault();
            if (!OPP(d, dir)) nextDir = d;
          }
        }, { passive: false });

        // Touch D-Pad
        dpad.addEventListener('touchstart', (e) => {
          for (const t of e.changedTouches) {
            const el = document.elementFromPoint(t.clientX, t.clientY);
            if (!el) continue;
            const s = el.getAttribute('data-dir');
            if (!s) continue;
            const [dx, dy] = s.split(',').map(Number);
            const d = { x: dx, y: dy };
            if (!OPP(d, dir)) nextDir = d;
          }
        }, { passive: true });

        // Game update
        function step(dt) {
          if (paused || gameOver) return;
          acc += dt;
          while (acc >= interval) {
            acc -= interval;
            update();
          }
        }

        function update() {
          // apply queued direction
          if (!OPP(nextDir, dir)) dir = nextDir;

          const head = snake[0];
          const next = { x: head.x + dir.x, y: head.y + dir.y };

          // collisions: walls
          if (next.x < 0 || next.y < 0 || next.x >= GRID || next.y >= GRID) {
            return endGame();
          }
          // collisions: self
          if (snake.some((s) => s.x === next.x && s.y === next.y)) {
            return endGame();
          }

          // move
          snake.unshift(next);

          // eat?
          if (next.x === food.x && next.y === food.y) {
            score += 1;
            $score.textContent = 'Score: ' + score;
            if (score > best) {
              best = score;
              localStorage.setItem(STORAGE_KEY, String(best));
              $best.textContent = 'Best: ' + best;
            }
            // speed up
            if (score % SPEEDUP_EVERY === 0) {
              interval = Math.max(55, Math.floor(interval * SPEEDUP_FACTOR));
              $speed.textContent = 'Speed: ' + (BASE_INTERVAL / interval).toFixed(1) + 'x';
            }
            food = spawnFood();
          } else {
            snake.pop();
          }

          draw();
        }

        function endGame() {
          gameOver = true;
          paused = true;
          setOverlay(true, 'Game Over', 'Press R to restart');
          document.body.classList.remove('playing');
          positionDpad();
          draw(true);
        }

        // Rendering
        function draw(highlight = false) {
          ctx.clearRect(0, 0, size, size);

          // background grid
          ctx.save();
          ctx.lineWidth = 1;
          ctx.strokeStyle = 'rgba(255,255,255,0.03)';
          for (let i = 1; i < GRID; i++) {
            const p = Math.floor(i * cell) + 0.5;
            ctx.beginPath();
            ctx.moveTo(p, 0); ctx.lineTo(p, size); ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, p); ctx.lineTo(size, p); ctx.stroke();
          }
          ctx.restore();

          // food
          drawFood(food.x, food.y);

          // snake
          for (let i = snake.length - 1; i >= 0; i--) {
            const s = snake[i];
            const isHead = i === 0;
            drawCell(s.x, s.y, isHead ? getHeadColor(highlight) : getBodyColor(i));
            if (isHead) drawEyes(s);
          }
        }

        function getBodyColor(i) {
          const t = i / Math.max(1, snake.length - 1);
          const from = hexToRgb(getComputedStyle(document.documentElement).getPropertyValue('--snake').trim());
          const to = hexToRgb('#2bab7a');
          const r = Math.round(lerp(from.r, to.r, t));
          const g = Math.round(lerp(from.g, to.g, t));
          const b = Math.round(lerp(from.b, to.b, t));
          return `rgb(${r},${g},${b})`;
        }
        function getHeadColor(highlight) {
          return highlight ? '#ff7b86' : getComputedStyle(document.documentElement).getPropertyValue('--snake-head').trim();
        }
        function drawCell(x, y, color) {
          const pad = Math.max(1, Math.floor(cell * 0.12));
          const r = Math.max(2, Math.floor(cell * 0.22));
          const px = Math.floor(x * cell) + pad;
          const py = Math.floor(y * cell) + pad;
          const w = Math.floor(cell - pad * 2);
          const h = w;
          roundRect(ctx, px, py, w, h, r, color);
        }
        function drawFood(x, y) {
          const cx = (x + 0.5) * cell;
          const cy = (y + 0.5) * cell;
          const r = Math.max(3, cell * 0.28);
          ctx.save();
          ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--food').trim();
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.fill();
          // tiny sparkle
          ctx.fillStyle = 'rgba(255,255,255,0.6)';
          ctx.beginPath();
          ctx.arc(cx - r * 0.35, cy - r * 0.35, r * 0.25, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
        function drawEyes(head) {
          const cx = (head.x + 0.5) * cell;
          const cy = (head.y + 0.5) * cell;
          const e = Math.max(1.5, cell * 0.07);
          const off = cell * 0.18;
          // direction-based eye placement
          const ex = dir.x * off;
          const ey = dir.y * off;
          ctx.save();
          ctx.fillStyle = '#0b0d10';
          ctx.beginPath();
          ctx.arc(cx - off + ex, cy - off + ey, e, 0, Math.PI * 2);
          ctx.arc(cx + off + ex, cy + off + ey, e, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        // tiny utils
        function roundRect(c, x, y, w, h, r, color) {
          c.save();
          c.fillStyle = color;
          c.beginPath();
          c.moveTo(x + r, y);
          c.arcTo(x + w, y, x + w, y + h, r);
          c.arcTo(x + w, y + h, x, y + h, r);
          c.arcTo(x, y + h, x, y, r);
          c.arcTo(x, y, x + w, y, r);
          c.closePath();
          c.fill();
          c.restore();
        }
        function hexToRgb(hex) {
          const h = hex.replace('#','').trim();
          const bigint = parseInt(h.length === 3 ? h.split('').map(ch => ch+ch).join('') : h, 16);
          return { r: (bigint >> 16) & 255, g: (bigint >> 8) & 255, b: bigint & 255 };
        }
        function lerp(a, b, t) { return a + (b - a) * t; }

        // Main loop
        function frame(ts) {
          if (!last) last = ts;
          const dt = ts - last;
          last = ts;
          step(dt);
          requestAnimationFrame(frame);
        }

        // Boot
        resize();
        setOverlay(true, 'Press Space or Tap', 'Space: Pause · R: Restart');
        requestAnimationFrame(frame);

        // Start on first user interaction
        window.addEventListener('keydown', onceStart, { once: true });
        canvas.addEventListener('pointerdown', onceStart, { once: true });
        function onceStart() { reset(); }

        // Help button toggles pause overlay
        helpBtn.addEventListener('click', () => {
          if (!paused) {
            paused = true;
            setOverlay(true, 'Paused', 'Press Space to resume');
            document.body.classList.remove('playing');
          } else if (!gameOver) {
            togglePause();
          }
        });

        // Only show dpad on touch devices
        if (!('ontouchstart' in window)) {
          dpad.hidden = true;
        }
      })();
    </script>
  </body>
</html>
